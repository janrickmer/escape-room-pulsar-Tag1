<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Das Vermögensgeheimnis · Finanzielle Bildung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DAS VERMÖGENSGEHEIMNIS — Escape Room
   Politik & Wirtschaft · Projektwoche Finanzielle Bildung (Jg. 9–12)
   Geldanlage · Sparen · Zinsen · Zinseszins
   Helles Design · Weiß & Gold
   ============================================================ */

:root{
  --bg:           #fffdf6;
  --bg-soft:      #f7eecb;
  --surface:      #ffffff;
  --surface-alt:  #fdf8ec;
  --ink:          #2a2410;
  --ink-soft:     #574b28;
  --ink-mute:     #8a7c54;
  --primary:      #b8860b;
  --primary-dark: #8c6608;
  --primary-soft: #f7ecc6;
  --accent:       #9a7d1a;
  --accent-bright:#d4af37;
  --accent-soft:  #fbf3d4;
  --success:      #2f8a44;
  --success-bg:   #e7f5ea;
  --error:        #c43d2b;
  --error-bg:     #fbeae6;
  --missed:       #9a7d1a;
  --missed-bg:    #fff3ce;
  --border:       rgba(42,36,16,0.13);
  --border-soft:  rgba(42,36,16,0.07);
  --shadow-sm:    0 1px 3px rgba(42,36,16,0.09), 0 1px 2px rgba(42,36,16,0.05);
  --shadow-md:    0 8px 28px rgba(140,102,8,0.14), 0 3px 8px rgba(42,36,16,0.07);
  --font-display: 'Bricolage Grotesque', 'Segoe UI', sans-serif;
  --font-body:    'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:    'IBM Plex Mono', 'Menlo', 'Courier New', monospace;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-weight:400;
  line-height:1.65;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body::before{
  content:'';
  position:fixed; inset:0; z-index:-2;
  background:
    radial-gradient(ellipse at 10% 6%, rgba(232,89,12,0.10) 0%, transparent 46%),
    radial-gradient(ellipse at 92% 96%, rgba(245,158,11,0.16) 0%, transparent 46%),
    radial-gradient(ellipse at 88% 10%, rgba(232,89,12,0.05) 0%, transparent 40%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
  pointer-events:none;
}

/* ---------- Faded map background (whole escape room) ---------- */
.map-bg{
  position:fixed; inset:0; z-index:-1; pointer-events:none;
  opacity:0.5;
  -webkit-mask-image: radial-gradient(ellipse at center, #000 55%, rgba(0,0,0,0.55) 100%);
          mask-image: radial-gradient(ellipse at center, #000 55%, rgba(0,0,0,0.55) 100%);
}
.map-bg .map-svg{ width:100%; height:100%; display:block; }

.app{ min-height:100vh; display:flex; flex-direction:column; }

/* ---------- Topbar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-soft);
  padding:12px 26px;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.topbar-brand{
  display:flex; align-items:center; gap:11px;
  font-family:var(--font-display); font-weight:700; font-size:15px;
  color:var(--primary); letter-spacing:0.005em;
}
.topbar-brand svg{ width:25px; height:25px; stroke:var(--primary); fill:none; }
.topbar-progress{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.seal{
  width:30px; height:30px; border-radius:50%;
  border:1.5px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  color:var(--ink-mute); transition:all .35s cubic-bezier(.4,0,.2,1);
}
.seal.library{
  width:11px; height:11px; border-radius:2px; border:1.5px solid var(--border);
  background:transparent;
}
.seal.library.active{ border-color:var(--primary); background:var(--primary); }
.seal.library.visited{ border-color:var(--accent-bright); background:var(--accent-bright); }
.seal.active{ border-color:var(--primary); color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
.seal.solved{
  background:var(--accent-bright); border-color:var(--accent-bright); color:var(--primary-dark);
  font-family:var(--font-display); font-weight:800; font-size:14px; transform:rotate(-3deg);
}

/* ---------- Layout ---------- */
.main{ flex:1; display:flex; align-items:flex-start; justify-content:center; padding:52px 22px 64px; }
.screen{ width:100%; max-width:880px; animation:screenIn .55s cubic-bezier(.16,1,.3,1) both; }
@keyframes screenIn{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }

.site-footer{
  text-align:center; font-size:11px; color:var(--ink-mute);
  padding:18px 12px 22px; border-top:1px solid var(--border-soft);
  font-family:var(--font-mono); letter-spacing:0.02em;
}

/* ---------- Typography ---------- */
h1,h2,h3{ font-family:var(--font-display); font-weight:700; line-height:1.12; color:var(--ink); letter-spacing:-0.012em; }
.kicker{
  font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:14px;
  display:flex; align-items:center; gap:11px;
}
.kicker::before{ content:''; width:26px; height:2px; background:var(--accent-bright); display:inline-block; border-radius:2px; }
.title-mega{ font-size:clamp(40px,7vw,68px); font-weight:800; line-height:1; margin-bottom:20px; letter-spacing:-0.03em; }
.title-mega em{ font-style:normal; color:var(--primary); }
.lede{ font-family:var(--font-display); font-size:clamp(17px,2vw,21px); font-weight:400; line-height:1.5; color:var(--ink-soft); max-width:60ch; margin-bottom:28px; }
.section-title{ font-size:clamp(28px,4vw,40px); font-weight:700; margin-bottom:8px; }
p{ margin-bottom:14px; }
p.body-lg{ font-size:16.5px; line-height:1.7; }
.text-mute{ color:var(--ink-mute); }

/* ---------- Cards ---------- */
.card{
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:12px; padding:30px 34px; margin-bottom:22px; box-shadow:var(--shadow-sm); position:relative;
}
.card-accent::before{
  content:''; position:absolute; left:0; top:22px; bottom:22px; width:4px;
  background:var(--accent-bright); border-radius:0 3px 3px 0;
}
.briefing{ font-family:var(--font-display); font-size:17px; line-height:1.7; color:var(--ink); padding-left:18px; }
.briefing .speaker{
  display:block; font-family:var(--font-mono); font-size:10px; font-weight:600;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:8px;
}
.part-label{ font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:9px; padding:13px 26px; border:none; border-radius:8px;
  font-family:var(--font-body); font-size:13.5px; font-weight:700; letter-spacing:0.01em;
  cursor:pointer; transition:all .22s cubic-bezier(.4,0,.2,1); text-decoration:none;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-primary:hover{ background:var(--primary-dark); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.btn-ghost{ background:transparent; color:var(--primary); border:1.5px solid var(--border); }
.btn-ghost:hover{ border-color:var(--primary); }
.btn-arrow::after{ content:'\2192'; font-family:var(--font-mono); font-size:15px; }
.btn-row{ display:flex; gap:14px; flex-wrap:wrap; margin-top:22px; align-items:center; }

/* ---------- Inputs ---------- */
.field-label{ display:block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
.text-input{
  width:100%; padding:12px 14px; background:var(--surface-alt); border:1.5px solid var(--border);
  border-radius:8px; color:var(--ink); font-family:var(--font-body); font-size:15px;
}
.text-input:focus{ outline:none; border-color:var(--primary); background:#fff; }
.input-error{ display:none; margin-top:14px; padding:10px 14px; background:var(--error-bg); border-left:3px solid var(--error); color:var(--ink); font-size:13px; border-radius:6px; }

/* ---------- Room header ---------- */
.room-header{ display:flex; align-items:flex-start; gap:18px; margin-bottom:18px; }
.room-number{ font-family:var(--font-display); font-size:46px; font-weight:800; color:var(--accent); line-height:0.9; }
.room-location{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-mute); }
.room-name{ font-family:var(--font-display); font-size:26px; font-weight:700; color:var(--ink); }

/* ---------- Library ---------- */
.library-banner{
  display:flex; gap:14px; align-items:flex-start; background:var(--primary-soft);
  border:1px solid rgba(232,89,12,0.22); border-radius:12px; padding:16px 18px; margin-bottom:26px;
}
.library-banner svg{ width:22px; height:22px; stroke:var(--primary); fill:none; flex-shrink:0; margin-top:2px; }
.library-banner .warn{ display:block; margin-top:6px; color:var(--primary-dark); font-weight:700; font-size:13.5px; }
.lib-section{ margin-bottom:22px; }
.lib-section-title{ font-family:var(--font-display); font-size:19px; font-weight:700; color:var(--primary); margin-bottom:8px; }
.lib-bullets{ margin:8px 0 0 20px; }
.lib-bullets li{ margin-bottom:7px; }
.lib-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:12px; }
@media(max-width:600px){ .lib-grid{ grid-template-columns:1fr; } }
.lib-card{ background:var(--surface-alt); border:1px solid var(--border-soft); border-radius:9px; padding:14px 16px; }
.lib-card-sub{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); }
.lib-card-title{ font-family:var(--font-display); font-size:16px; font-weight:700; margin:2px 0 5px; }
.lib-card-body{ font-size:13.5px; color:var(--ink-soft); }
.lib-table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
.lib-table th,.lib-table td{ text-align:left; padding:9px 11px; border-bottom:1px solid var(--border-soft); vertical-align:top; }
.lib-table th{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); }
.lib-note{
  display:block; background:var(--accent-soft);
  border:1px solid rgba(184,134,11,0.32); border-radius:9px; padding:13px 16px; margin-top:6px; font-size:13.5px; line-height:1.6;
}
.lib-note b{ color:var(--primary-dark); }
.video-wrap{ position:relative; width:100%; padding-top:56.25%; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-md); background:#1a0f06; margin:8px 0; }
.video-wrap iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
.fallback-line{ display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:14px; font-size:14px; color:var(--ink-soft); }
.timeline{ list-style:none; margin:6px 0 0; padding:0; }
.timeline li{ position:relative; padding:0 0 16px 26px; border-left:2px solid var(--primary-soft); }
.timeline li:last-child{ border-left-color:transparent; padding-bottom:0; }
.timeline li::before{ content:''; position:absolute; left:-7px; top:3px; width:12px; height:12px; border-radius:50%; background:var(--accent-bright); border:2px solid var(--primary); }
.timeline .yr{ font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--primary); letter-spacing:0.04em; }
.timeline .ev{ font-weight:700; }
.lib-warning-bar{
  display:flex; gap:12px; align-items:center; background:var(--accent-soft);
  border:1px solid rgba(184,134,11,0.32); border-radius:12px; padding:14px 18px; margin:22px 0;
}
.lib-warning-bar svg{ width:22px; height:22px; stroke:var(--accent); fill:none; flex-shrink:0; }

/* ---------- Puzzle: single choice ---------- */
.mc-question{ margin-bottom:24px; }
.mc-q-text{ font-weight:700; font-size:16px; margin-bottom:12px; }
.mc-option{
  display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
  padding:13px 16px; margin-bottom:9px; background:var(--surface); border:1.5px solid var(--border);
  border-radius:9px; cursor:pointer; font-size:14.5px; line-height:1.5; transition:all .18s ease; font-family:var(--font-body); color:var(--ink);
}
.mc-option:hover{ border-color:var(--primary); }
.mc-option .dot{ width:18px; height:18px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; margin-top:1px; }
.mc-option.selected{ border-color:var(--primary); background:var(--primary-soft); }
.mc-option.selected .dot{ border-color:var(--primary); background:var(--primary); box-shadow:inset 0 0 0 3px var(--surface); }
.mc-option.correct{ border-color:var(--success); background:var(--success-bg); }
.mc-option.incorrect{ border-color:var(--error); background:var(--error-bg); }

/* ---------- Puzzle: lückentext + dropdowns + freie eingaben ---------- */
.cloze{ font-size:16px; line-height:2.4; }
.cloze select{
  font-family:var(--font-body); font-size:14px; font-weight:700; color:var(--primary);
  background:var(--accent-soft); border:1.5px solid var(--accent); border-radius:6px; padding:4px 8px; margin:0 2px;
}
.cloze-input{
  font-family:var(--font-body); font-size:15px; font-weight:700; color:var(--primary);
  background:#fff; border:1.5px solid var(--accent); border-radius:6px; padding:3px 9px; margin:0 2px; width:8.5em;
  text-align:center;
}
.cloze-input:focus{ outline:none; border-color:var(--primary); }
.cloze-input.narrow{ width:4.5em; }
.cloze select.ok, .match-select.ok, .cloze-input.ok{ border-color:var(--success); background:var(--success-bg); color:var(--success); }
.cloze select.bad, .match-select.bad, .cloze-input.bad{ border-color:var(--error); background:var(--error-bg); color:var(--error); }
.match-row{ display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--border-soft); flex-wrap:wrap; }
.match-left{ flex:1; min-width:200px; font-weight:700; font-size:15px; }
.match-select{
  flex:1.5; min-width:240px;
  font-family:var(--font-body); font-size:14px; font-weight:600; color:var(--primary);
  background:var(--accent-soft); border:1.5px solid var(--accent); border-radius:6px; padding:7px 9px;
}

/* ---------- Puzzle: multi-select grid ---------- */
.multi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:11px; margin:20px 0; }
@media(max-width:600px){ .multi-grid{ grid-template-columns:1fr; } }
.multi-card{
  display:flex; align-items:flex-start; gap:11px; padding:15px 16px; background:var(--surface);
  border:1.5px solid var(--border); border-radius:9px; cursor:pointer; font-size:14px; line-height:1.45;
  text-align:left; transition:all .18s ease; font-family:var(--font-body); color:var(--ink);
}
.multi-card:hover{ border-color:var(--primary); }
.multi-card .box{ width:18px; height:18px; border-radius:5px; border:2px solid var(--border); flex-shrink:0; margin-top:1px; }
.multi-card.selected{ border-color:var(--primary); background:var(--primary-soft); }
.multi-card.selected .box{ border-color:var(--primary); background:var(--primary); }
.multi-card.correct{ border-color:var(--success); background:var(--success-bg); }
.multi-card.incorrect{ border-color:var(--error); background:var(--error-bg); }
.multi-card.missed{ border-color:var(--missed); background:var(--missed-bg); }

/* ---------- Puzzle: classify / ordering rows ---------- */
.classify-row{ display:flex; align-items:center; gap:12px; padding:12px 8px; border-bottom:1px solid var(--border-soft); flex-wrap:wrap; border-radius:6px; }
.classify-text{ flex:1; min-width:210px; font-size:14.5px; }
.classify-btns{ display:flex; gap:8px; }
.classify-btn{
  font-family:var(--font-body); font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:7px;
  border:1.5px solid var(--border); background:var(--surface); color:var(--ink-soft); cursor:pointer; transition:all .18s ease;
}
.classify-btn:hover{ border-color:var(--primary); }
.classify-btn.active{ border-color:var(--primary); background:var(--primary); color:#fff; }
.classify-row.correct{ background:var(--success-bg); }
.classify-row.incorrect{ background:var(--error-bg); }
.order-select{
  font-family:var(--font-body); font-size:13px; font-weight:700; color:var(--primary);
  background:var(--accent-soft); border:1.5px solid var(--accent); border-radius:7px; padding:7px 10px;
}
.order-select.ok{ border-color:var(--success); background:var(--success-bg); color:var(--success); }
.order-select.bad{ border-color:var(--error); background:var(--error-bg); color:var(--error); }

/* ---------- Status / hint ---------- */
.status{ padding:14px 18px; border-radius:9px; margin:18px 0; font-size:14px; display:none; }
.status.show{ display:block; animation:screenIn .3s ease both; }
.status .label{ display:block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:4px; }
.status-success{ background:var(--success-bg); border-left:3px solid var(--success); }
.status-success .label{ color:var(--success); }
.status-warning{ background:var(--error-bg); border-left:3px solid var(--error); }
.status-warning .label{ color:var(--error); }
.hint-box{ display:none; background:var(--surface-alt); border:1px dashed var(--border); border-radius:9px; padding:14px 18px; margin-top:16px; font-size:14px; color:var(--ink-soft); }
.hint-box.show{ display:block; }
.hint-box .label{ display:block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:5px; }
.hint-btn{ background:none; border:none; color:var(--primary); font-family:var(--font-body); font-size:13px; font-weight:700; cursor:pointer; text-decoration:underline; }

/* ---------- Reveal overlay ---------- */
.reveal-overlay{ position:fixed; inset:0; z-index:200; background:rgba(42,26,12,0.55); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; padding:20px; }
.reveal-overlay.show{ display:flex; animation:screenIn .3s ease both; }
.reveal-card{ background:var(--surface); border-radius:16px; box-shadow:var(--shadow-md); padding:40px 44px; max-width:440px; text-align:center; }
.reveal-letter{ font-family:var(--font-display); font-size:96px; font-weight:800; color:var(--primary); line-height:1; }
.reveal-caption{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-mute); margin-top:6px; }
.reveal-progress{ display:flex; gap:8px; justify-content:center; margin:22px 0 26px; }
.reveal-progress-letter{ width:38px; height:46px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:22px; font-weight:800; color:var(--ink-mute); background:var(--surface-alt); border:1px solid var(--border); border-radius:7px; }
.reveal-progress-letter.lit{ color:var(--primary-dark); background:var(--accent-bright); border-color:var(--accent-bright); }

/* ---------- Final ---------- */
.final-hero{ text-align:center; margin-bottom:30px; }
.final-code{ font-family:var(--font-display); font-size:clamp(54px,12vw,104px); font-weight:800; letter-spacing:0.08em; color:var(--primary); line-height:1; }
.final-actions{ display:grid; gap:14px; }
.final-action{ display:block; width:100%; text-align:left; background:var(--surface-alt); border:1.5px solid var(--border); border-radius:11px; padding:18px 20px; cursor:pointer; transition:all .2s ease; font-family:var(--font-body); }
.final-action:hover{ border-color:var(--primary); box-shadow:var(--shadow-sm); }
.final-action .label{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); font-weight:600; }
.final-action .title{ font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--ink); margin:3px 0 4px; }
.final-action .desc{ font-size:13.5px; color:var(--ink-soft); }
.font-mono{ font-family:var(--font-mono); }
.muted-list{ margin:6px 0 0 18px; }
.muted-list li{ margin-bottom:6px; color:var(--ink-soft); font-size:14px; }

/* Emblem (Kompass) */
.emblem-wrap{ text-align:center; margin:10px 0 4px; }
.emblem-wrap svg{ max-width:300px; width:100%; height:auto; }
.emblem-cap{ text-align:center; font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.08em; color:var(--ink-mute); margin-top:6px; }

/* Steckbrief */
.steck-card{ background:var(--surface-alt); border:1px solid var(--border-soft); border-radius:12px; padding:22px 24px; }

<!-- ==== Eingebetteter Feiditor (Digitales Arbeitsblatt) ==== -->
<script type="text/template" id="feiditor-src">
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feiditor</title>
<style>
  :root{
    --paper:#f7f4ec; --paper2:#fffdf8; --ink:#221f1a; --muted:#6f675a;
    --line:#ddd5c4; --accent:#6b4f2c; --accent2:#8a6a3c; --shadow:rgba(40,30,15,.10);
    --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
    --sans:"Avenir Next",Avenir,"Segoe UI","Helvetica Neue",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .screen{display:none; min-height:100vh}
  .screen.active{display:block}

  /* ---------- Start ---------- */
  #screen-start{display:none; place-items:center; padding:40px 20px}
  #screen-start.active{display:grid}
  .card{
    width:100%; max-width:440px; background:var(--paper2);
    border:1px solid var(--line); border-radius:14px; padding:40px 36px;
    box-shadow:0 18px 50px -28px var(--shadow);
  }
  .brand{font-family:var(--serif); font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin:0 0 6px}
  .card h1{font-family:var(--serif); font-weight:600; font-size:30px; margin:0 0 4px; letter-spacing:.01em}
  .card p.sub{color:var(--muted); margin:0 0 26px; font-size:14.5px}
  label{display:block; font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:0 0 6px}
  .field{margin-bottom:18px}
  input[type=text]{
    width:100%; font-family:var(--serif); font-size:18px; color:var(--ink);
    background:var(--paper); border:1px solid var(--line); border-radius:9px;
    padding:11px 13px; outline:none; transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus{border-color:var(--accent2); box-shadow:0 0 0 3px rgba(138,106,60,.16)}
  .btn{
    font-family:var(--sans); font-size:15px; font-weight:600; letter-spacing:.01em;
    color:var(--paper2); background:var(--ink); border:1px solid var(--ink);
    border-radius:9px; padding:12px 18px; cursor:pointer; transition:transform .06s, background .15s;
  }
  .btn:hover{background:#332e25}
  .btn:active{transform:translateY(1px)}
  .btn.block{width:100%; margin-top:6px}
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--line)}
  .btn.ghost:hover{background:var(--paper)}
  .err{color:#b3261e; font-size:13.5px; min-height:18px; margin:2px 0 0}
  .foot{margin-top:24px; padding-top:16px; border-top:1px solid var(--line); text-align:center}
  .foot a{color:var(--muted); font-size:12.5px; text-decoration:none; letter-spacing:.04em}
  .foot a:hover{color:var(--accent); text-decoration:underline}

  /* ---------- Editor ---------- */
  #screen-editor{display:none; flex-direction:column; height:100vh}
  #screen-editor.active{display:flex}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:13px 22px; border-bottom:1px solid var(--line); background:var(--paper2);
  }
  .who{font-family:var(--serif); font-size:16px}
  .who .lbl{font-family:var(--sans); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-right:8px}
  .count{font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums}
  .paperwrap{flex:1; overflow:auto; display:flex; flex-direction:column; align-items:center; padding:34px 20px 150px}
  .sheet{
    width:100%; max-width:760px; background:var(--paper2); border:1px solid var(--line);
    border-radius:6px; box-shadow:0 24px 60px -40px var(--shadow); padding:56px 60px;
  }
  #editor{
    width:100%; min-height:60vh; border:0; outline:0; background:transparent;
    font-family:var(--serif); font-size:18.5px; line-height:1.78; color:var(--ink);
    white-space:pre-wrap; word-wrap:break-word; overflow-wrap:anywhere;
  }
  #editor:focus{outline:0}
  #editor .heading{font-weight:700; font-size:2em; line-height:1.25; margin:.1em 0}
  #editor.empty::before{content:attr(data-placeholder); color:#b9b0a0; pointer-events:none}

  /* ---------- Formatierungsleiste (Word-artig) ---------- */
  .formatbar{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:9px 22px; border-bottom:1px solid var(--line); background:var(--paper2);
  }
  .fbtn{
    font-family:var(--sans); font-size:15px; min-width:38px; height:34px; padding:0 11px;
    color:var(--ink); background:var(--paper); border:1px solid var(--line); border-radius:8px;
    cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
    transition:background .12s, border-color .12s, color .12s; user-select:none;
  }
  .fbtn:hover{background:#efe9dd}
  .fbtn:active{transform:translateY(1px)}
  .fbtn.active{background:var(--accent); color:var(--paper2); border-color:var(--accent)}
  .fbtn.wide{font-size:13.5px; letter-spacing:.02em}
  .fbtn .b{font-weight:800}
  .fbtn .i{font-style:italic}
  .fbtn .u{text-decoration:underline}
  .fsep{width:1px; height:22px; background:var(--line); margin:0 3px}
  .actionbar{
    position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center;
    padding:16px 16px 46px; background:linear-gradient(to top, var(--paper) 60%, rgba(247,244,236,0));
  }
  .copyright{
    position:fixed; left:0; right:0; bottom:13px; text-align:center;
    font-size:11px; letter-spacing:.05em; color:var(--muted); pointer-events:none; z-index:6;
  }

  /* ---------- Lehrkraft ---------- */
  #screen-teacher{display:none; place-items:start center; padding:40px 20px 80px}
  #screen-teacher.active{display:grid}
  .panel{width:100%; max-width:920px}
  .panel h1{font-family:var(--serif); font-weight:600; font-size:26px; margin:0 0 4px}
  .panel .sub{color:var(--muted); margin:0 0 22px; font-size:14.5px}
  .drop{
    background:var(--paper2); border:1.5px dashed var(--line); border-radius:12px;
    padding:26px; text-align:center; color:var(--muted); font-size:14.5px;
  }
  .drop strong{color:var(--ink)}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:14px}
  input[type=password]{
    font-family:var(--serif); font-size:18px; letter-spacing:.12em; width:180px;
    background:var(--paper); border:1px solid var(--line); border-radius:9px; padding:10px 12px; outline:none;
  }
  input[type=password]:focus{border-color:var(--accent2); box-shadow:0 0 0 3px rgba(138,106,60,.16)}
  .hidden{display:none !important}
  .backlink{display:inline-block; margin-bottom:18px; color:var(--muted); font-size:13px; text-decoration:none}
  .backlink:hover{color:var(--accent)}

  /* analysis */
  .legend{display:flex; gap:18px; flex-wrap:wrap; margin:20px 0 14px; font-size:13.5px; color:var(--muted)}
  .legend span{display:inline-flex; align-items:center; gap:7px}
  .sw{width:13px; height:13px; border-radius:3px; display:inline-block}
  .stat{font-size:13px; color:var(--muted); margin:0 0 16px; font-variant-numeric:tabular-nums}
  .analysis{
    background:var(--paper2); border:1px solid var(--line); border-radius:10px;
    padding:30px 34px; font-family:var(--serif); font-size:17.5px; line-height:1.85;
    white-space:pre-wrap; word-wrap:break-word; overflow-wrap:anywhere;
  }
  .nmeta{font-family:var(--sans); font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:14px}

  /* Rote Felder (Escape-Room-Modus, identisch zum eingebetteten Feiditor) */
  .moodle-hints{max-width:760px; margin:0 auto}
  .moodle-hint{
    max-width:760px; margin:14px auto 0; padding:14px 20px;

/* ---------- Helvetica-Bold-Glyphbreiten (AFM). ASCII exakt; Latin-1-Akzente von Basisbuchstaben ---------- */
const HELVB={32:278,33:333,34:474,35:556,36:556,37:889,38:722,39:238,40:333,41:333,42:389,43:584,44:278,45:333,46:278,47:278,48:556,49:556,50:556,51:556,52:556,53:556,54:556,55:556,56:556,57:556,58:333,59:333,60:584,61:584,62:584,63:611,64:975,65:722,66:722,67:722,68:722,69:667,70:611,71:778,72:722,73:278,74:556,75:722,76:611,77:833,78:722,79:778,80:667,81:778,82:722,83:667,84:611,85:722,86:667,87:944,88:667,89:667,90:611,91:333,92:278,93:333,94:584,95:556,96:333,97:556,98:611,99:556,100:611,101:556,102:333,103:611,104:611,105:278,106:278,107:556,108:278,109:889,110:611,111:611,112:611,113:611,114:389,115:556,116:333,117:611,118:556,119:778,120:556,121:556,122:500,123:389,124:280,125:389,126:584,192:722,193:722,194:722,195:722,196:722,197:722,198:1000,199:722,200:667,201:667,202:667,203:667,204:278,205:278,206:278,207:278,208:722,209:722,210:778,211:778,212:778,213:778,214:778,215:584,216:778,217:722,218:722,219:722,220:722,221:667,222:667,223:611,224:556,225:556,226:556,227:556,228:556,229:556,230:889,231:556,232:556,233:556,234:556,235:556,236:278,237:278,238:278,239:278,240:611,241:611,242:611,243:611,244:611,245:611,246:611,247:584,248:611,249:611,250:611,251:611,252:611,253:556,254:611,255:556};
function afmW(b,bold){const T=bold?HELVB:HELV;return T[b]!==undefined?T[b]:(HELV[b]!==undefined?HELV[b]:556);}
function chW(ch,bold,s){return afmW(charByte(ch),bold)/1000*s;}
function runWidth(str,bold,s){let w=0;for(const ch of str)w+=chW(ch,bold,s);return w;}
function fontFor(b,i){if(b&&i)return"F4";if(b)return"F2";if(i)return"F3";return"F1";}
const CP1252={0x20AC:128,0x201A:130,0x0192:131,0x201E:132,0x2026:133,0x2020:134,0x2021:135,0x02C6:136,0x2030:137,0x0160:138,0x2039:139,0x0152:140,0x017D:142,0x2018:145,0x2019:146,0x201C:147,0x201D:148,0x2022:149,0x2013:150,0x2014:151,0x02DC:152,0x2122:153,0x0161:154,0x203A:155,0x0153:156,0x017E:158,0x0178:159};
function charByte(ch){const cp=ch.codePointAt(0);if(cp<=0xFF)return cp;if(CP1252[cp]!==undefined)return CP1252[cp];return 0x3F;}
function charWidth(ch,s){return afm(charByte(ch))/1000*s;}
function textWidth(str,s){let w=0;for(const ch of str)w+=charWidth(ch,s);return w;}
function encStr(str){let o="";for(const ch of str){const b=charByte(ch);if(b===0x28)o+="\\(";else if(b===0x29)o+="\\)";else if(b===0x5C)o+="\\\\";else o+=String.fromCharCode(b);}return o;}

/* Absatz (Array {ch,b,i,u,h}, einheitliche Größe) -> Anzeigezeilen (jede = Array von {ch,b,i,u}) */
function wrapPara(chars,size,maxW){
  const lines=[]; let cur=[]; let curW=0; let lastSpace=-1;
  for(const c of chars){
    const w=chW(c.ch,c.b,size);
    if(curW+w>maxW && cur.length>0){
      if(lastSpace>=0){
        const head=cur.slice(0,lastSpace);
        const tail=cur.slice(lastSpace+1);
        lines.push(head);
        cur=tail; curW=0; for(const x of cur)curW+=chW(x.ch,x.b,size);
        lastSpace=-1; for(let k=cur.length-1;k>=0;k--){if(cur[k].ch===" "){lastSpace=k;break;}}
      } else { lines.push(cur); cur=[]; curW=0; lastSpace=-1; }
    }
    cur.push(c); curW+=w;
    if(c.ch===" ") lastSpace=cur.length-1;
  }
  lines.push(cur);
  return lines.length?lines:[[]];
}
function lineToRuns(lineChars){
  const runs=[];
  for(const c of lineChars){
    const last=runs[runs.length-1];
    if(last && last.b===c.b && last.i===c.i && last.u===c.u) last.text+=c.ch;
    else runs.push({text:c.ch,b:c.b,i:c.i,u:c.u});
  }
  return runs;
}

function buildPdf(opts){
  const PW=595.28,PH=841.89, ML=56,MR=56,MT=56,MB=64;
  const HEAD_SIZE=13, BODY_SIZE=11, HEAD2_SIZE=22, NOTE_SIZE=11;
  const BODY_LEAD=15.5, HEAD_LEAD=28;
  const usableW=PW-ML-MR;
  const headerBaseline=PH-MT-HEAD_SIZE, ruleY=headerBaseline-6, bodyTop=ruleY-22, bodyBottom=MB+24;

  const text=opts.text||""; const fmt=opts.fmt||[];
  // in Absätze an '\n' teilen
  const paras=[]; { let cur=[]; for(let i=0;i<text.length;i++){ const ch=text[i]; if(ch==="\n"){paras.push(cur);cur=[];} else { const ft=fmt[i]||{}; cur.push({ch,b:!!ft.b,i:!!ft.i,u:!!ft.u,h:!!ft.h}); } } paras.push(cur); }

  // Anzeigezeilen mit Größe/Durchschuss
  const dispLines=[];
  for(const para of paras){
    const heading=para.length?para[0].h:false;
    const size=heading?HEAD2_SIZE:BODY_SIZE;
    const lead=heading?HEAD_LEAD:BODY_LEAD;
    if(para.length===0){ dispLines.push({runs:[],size:BODY_SIZE,lead:BODY_LEAD}); continue; }
    const wrapped=wrapPara(para,size,usableW);
    for(const wl of wrapped) dispLines.push({runs:lineToRuns(wl),size,lead});
  }
  if(dispLines.length===0) dispLines.push({runs:[],size:BODY_SIZE,lead:BODY_LEAD});

  // Seiten füllen
  const pages=[]; let idx=0;
  while(idx<dispLines.length){
    const pageLines=[]; let y=bodyTop;
    while(idx<dispLines.length && y>=bodyBottom){ const dl=dispLines[idx]; pageLines.push({dl,y}); y-=dl.lead; idx++; }
    if(pageLines.length===0){ pageLines.push({dl:dispLines[idx],y:bodyTop}); idx++; }
    pages.push({lines:pageLines});
  }
  const nPages=pages.length;

  const noteText="Bitte diese PDF-Datei herunterladen und bei Moodle hochladen.";
  const noteLines=[]; { // Hinweis ist immer normal/unformatiert
    const arr=noteText.split("").map(ch=>({ch,b:false,i:false,u:false}));
    for(const wl of wrapPara(arr,NOTE_SIZE,usableW)) noteLines.push(lineToRuns(wl));
  }
  const noteBottom=46;

  const pageObjNum=(i)=>7+i*2, contObjNum=(i)=>8+i*2;
  const objects={};
  objects[1]="<< /Type /Catalog /Pages 2 0 R >>";
  objects[2]=`<< /Type /Pages /Count ${nPages} /Kids [${pages.map((_,i)=>`${pageObjNum(i)} 0 R`).join(" ")}] >>`;
  objects[3]="<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>";
  objects[4]="<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>";
  objects[5]="<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Oblique /Encoding /WinAnsiEncoding >>";
  objects[6]="<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-BoldOblique /Encoding /WinAnsiEncoding >>";

  for(let i=0;i<nPages;i++){
    objects[pageObjNum(i)]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW.toFixed(2)} ${PH.toFixed(2)}] /Resources << /Font << /F1 3 0 R /F2 4 0 R /F3 5 0 R /F4 6 0 R >> >> /Contents ${contObjNum(i)} 0 R >>`;
    let s="0.5 w\n";
    // Name + Linie
    s+=`BT /F1 ${HEAD_SIZE} Tf 0 0 0 rg ${ML} ${headerBaseline.toFixed(2)} Td (${encStr(opts.name||"")}) Tj ET\n`;
    s+=`${ML} ${ruleY.toFixed(2)} m ${(PW-MR).toFixed(2)} ${ruleY.toFixed(2)} l S\n`;
    // Textzeilen
    const underlines=[];
    for(const pl of pages[i].lines){
      const dl=pl.dl, y=pl.y;
      if(dl.runs.length){
        s+=`BT 1 0 0 1 ${ML.toFixed(2)} ${y.toFixed(2)} Tm 0 0 0 rg\n`;
        let x=ML;
        for(const run of dl.runs){
          const fn=fontFor(run.b,run.i);
          s+=`/${fn} ${dl.size} Tf (${encStr(run.text)}) Tj\n`;
          const rw=runWidth(run.text,run.b,dl.size);
          if(run.u){ underlines.push({x1:x,x2:x+rw,y:y-dl.size*0.12,lw:Math.max(0.5,dl.size*0.06)}); }
          x+=rw;
        }
        s+="ET\n";
      }
    }
    for(const ul of underlines){
      s+=`${ul.lw.toFixed(2)} w 0 0 0 RG ${ul.x1.toFixed(2)} ${ul.y.toFixed(2)} m ${ul.x2.toFixed(2)} ${ul.y.toFixed(2)} l S\n`;
    }
    // roter Hinweis nur auf der letzten Seite
    if(i===nPages-1){
      let yy=noteBottom+(noteLines.length-1)*BODY_LEAD;
      for(const runs of noteLines){
        s+=`BT 1 0 0 1 ${ML.toFixed(2)} ${yy.toFixed(2)} Tm 0.78 0.05 0.05 rg\n`;
        for(const run of runs){ s+=`/F1 ${NOTE_SIZE} Tf (${encStr(run.text)}) Tj\n`; }
        s+="ET\n";
        yy-=BODY_LEAD;
      }
    }
    objects[contObjNum(i)]={stream:s};
  }

  let pdf="%PDF-1.7\n%\u00E2\u00E3\u00CF\u00D3\n";
  if(opts.trackB64) pdf+=`%TRACKDATA ${opts.trackB64}\n`;
  const offsets={}; const maxNum=6+nPages*2;
  for(let n=1;n<=maxNum;n++){
    offsets[n]=pdf.length; const o=objects[n];
    if(o&&o.stream!==undefined){const st=o.stream;pdf+=`${n} 0 obj\n<< /Length ${st.length} >>\nstream\n${st}endstream\nendobj\n`;}
    else pdf+=`${n} 0 obj\n${o}\nendobj\n`;
  }
  const xrefStart=pdf.length;
  pdf+=`xref\n0 ${maxNum+1}\n0000000000 65535 f \n`;
  for(let n=1;n<=maxNum;n++) pdf+=String(offsets[n]).padStart(10,"0")+" 00000 n \n";
  pdf+=`trailer\n<< /Size ${maxNum+1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;
  return pdf;
}

/* ---------------- gemeinsame Krypto- & Auswertungs-Funktionen ---------------- *
 * Diese werden per toString() in die Lehrkraft-Seite (data:-Link) eingebettet,  *
 * damit es nur EINE Quelle der Wahrheit gibt.                                   */
function bytesToB64(bytes){let bin="";const CH=0x8000;for(let i=0;i<bytes.length;i+=CH)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH));return btoa(bin);}
function b64ToBytes(b64){const bin=atob(b64);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
async function _key(codeStr,usage){const mat=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(codeStr));return crypto.subtle.importKey("raw",mat,{name:"AES-GCM"},false,usage);}
async function aesEncrypt(plain,codeStr){const iv=crypto.getRandomValues(new Uint8Array(12));const key=await _key(codeStr,["encrypt"]);const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(plain));return bytesToB64(iv)+":"+bytesToB64(new Uint8Array(ct));}
async function aesDecrypt(bundle,codeStr){const parts=bundle.split(":");const iv=b64ToBytes(parts[0]);const ct=b64ToBytes(parts[1]);const key=await _key(codeStr,["decrypt"]);const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);return new TextDecoder().decode(pt);}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function classify(isVisible,src,gap){
  const COL={plain:"#23201b",paste:"#b3261e",fast:"#c2710c",slow:"#1f7a34",system:"#9c948a"};
  if(src==="s") return COL.system;           // System-Text (vorbefüllte Aufgaben) -> gedämpftes Grau
  if(!isVisible) return COL.plain;
  if(src==="p") return COL.paste;            // aus Zwischenablage -> rot
  if(gap>=0&&gap<=15) return COL.paste;      // <= 0,015 s getippt -> rot
  if(gap>15&&gap<=70) return COL.fast;       // 0,015-0,07 s -> orange
  return COL.slow;                           // > 0,07 s / erstes Zeichen -> grün
}
function renderAnalysis(payload){
  const t=payload.t, m=payload.m||[], f=payload.f||[];
  let html=""; let total=0,red=0,orange=0,green=0;
  const WS=/\s/;
  for(let i=0;i<t.length;i++){
    const ch=t[i]; const isV=!WS.test(ch);
    const mark=m[i]||["t",-1]; const src=mark[0]; const gap=mark[1];
    const col=classify(isV,src,gap);
    if(isV && src!=="s"){ total++;
      if(col==="#b3261e") red++;
      else if(col==="#c2710c") orange++;
      else green++;
    }
    const fl=f[i]||0; let st="color:"+col;
    if(fl&8){ st+=";font-weight:700;font-size:1.6em"; } else if(fl&1){ st+=";font-weight:700"; }
    if(fl&2) st+=";font-style:italic";
    if(fl&4) st+=";text-decoration:underline";
    html+=`<span style="${st}">${esc(ch)}</span>`;
  }
  const pct=(x)=>total?Math.round(x/total*100):0;
  const legend=
    '<div class="legend">'+
      '<span><i class="sw" style="background:#b3261e"></i>eingefügt oder ≤ 0,015 s getippt</span>'+
      '<span><i class="sw" style="background:#c2710c"></i>0,015–0,07 s nach vorherigem Zeichen getippt</span>'+
      '<span><i class="sw" style="background:#1f7a34"></i>&gt; 0,07 s nach vorherigem Zeichen getippt</span>'+
    '</div>';
  const stat=`<p class="stat">Zeichen gesamt: ${total} · rot: ${red} (${pct(red)} %) · orange: ${orange} (${pct(orange)} %) · grün: ${green} (${pct(green)} %)</p>`;
  const head=`<div class="nmeta">Verfasser:in — ${esc(payload.n||"")}</div>`;
  return head+legend+stat+`<div class="analysis">${html}</div>`;
}

/* ---------------- Lehrkraft-Seite für den data:-Link bauen ---------------- */
function buildTeacherHtml(bundle){
  const shared=[bytesToB64,b64ToBytes,_key,aesDecrypt,esc,classify,renderAnalysis].map(f=>f.toString()).join("\n");
  const css=
    'body{margin:0;background:#f7f4ec;color:#221f1a;font-family:"Avenir Next",Avenir,"Segoe UI","Helvetica Neue",system-ui,sans-serif;line-height:1.5}'+
    '.wrap{max-width:920px;margin:0 auto;padding:40px 22px 80px}'+
    'h1{font-family:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;font-weight:600;font-size:26px;margin:0 0 6px}'+
    '.sub{color:#6f675a;margin:0 0 22px;font-size:14.5px}'+

/* ----------------------- geheime Code-Bildung (Lehrkraft) ----------------------- */
function _kf(s){const n=(s.match(/\p{L}/gu)||[]).length;return String(n*(0x230+0x220));}

/* ------------------------------ Tracking ------------------------------ */
let prevValue="";
let recs=[];          // pro Zeichen: {src:'t'|'p', t:ms}
let justPasted=false; // wird durch paste/drop gesetzt, nach einem input-Event geleert

function reconcile(newVal,pasted,now){
  const a=prevValue,b=newVal; const minL=Math.min(a.length,b.length);
  let p=0; while(p<minL&&a[p]===b[p])p++;
  let s=0; while(s<minL-p&&a[a.length-1-s]===b[b.length-1-s])s++;
  const removed=a.length-p-s;
  const inserted=b.slice(p,b.length-s);
  const ins=inserted.split("").map(()=>({src:pasted?"p":"t",t:now}));
  recs.splice(p,removed,...ins);
  if(recs.length!==b.length){ // Sicherheitsnetz gegen Desync
    recs=b.split("").map(()=>({src:"t",t:now}));
  }
  prevValue=newVal;
}

function buildPayload(name,text,fmt){
  if(recs.length!==text.length){ // letzte Absicherung
    const now=Date.now(); recs=text.split("").map(()=>({src:"t",t:now}));
  }
  fmt=fmt||[];
  const m=[]; const f=[];
  for(let i=0;i<text.length;i++){
    const gap=(i===0)?-1:(recs[i].t-recs[i-1].t);
    m.push([recs[i].src,gap]);
    const ft=fmt[i]||{};
    let bits=0; if(ft.b)bits|=1; if(ft.i)bits|=2; if(ft.u)bits|=4; if(ft.h)bits|=8;
    f.push(bits);
  }
  return {n:name,t:text,m,f};
}

const $=(id)=>document.getElementById(id);

function sanitize(s){return (s||"").replace(/[^\p{L}\p{N}_-]/gu,"_").slice(0,40)||"Datei";}
function asciiName(s){
  return (s||"")
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue")
    .replace(/Ä/g,"Ae").replace(/Ö/g,"Oe").replace(/Ü/g,"Ue").replace(/ß/g,"ss")
    .normalize("NFKD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Za-z0-9_-]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"")
    .slice(0,40) || "Datei";
}
function fileSafe(s){return (s||"").replace(/[\/\\:*?"<>|\u0000-\u001f]/g,"").replace(/\s+/g," ").trim().slice(0,90)||"Datei";}
function downloadBlob(blob,filename){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

/* ---------- Escape-Room-Modus: aus hochgeladener Überblick-PDF rekonstruieren ---------- */
function buildPrefill(tasks){
  const lines=[];
  tasks.forEach((task,i)=>{
    lines.push("Aufgabe "+(i+1));
    lines.push(task);
    for(let k=0;k<8;k++) lines.push("");   // 8 Leerzeilen Lösungsraum
  });
  return lines.join("\n");
}
/* Vorbefüllte Aufgaben (System-Text) unterstreichen, ohne den reinen Text zu ändern.
   Wrappt den Inhalt jedes nicht-leeren Blocks in <u>; Leerzeilen (Lösungsraum) bleiben normal.
   Der reine Text bleibt identisch -> recs/charcount bleiben synchron. */
function underlinePrefillBlocks(){
  const root=$("editor");
  Array.prototype.forEach.call(root.childNodes,function(blk){
    if(blk.nodeType!==1) return;
    const txt=(blk.textContent||"").replace(/\u200B/g,"");
    if(txt.trim()==="") return;
    if(blk.querySelector && blk.querySelector("u")) return;
    const u=document.createElement("u");
    while(blk.firstChild) u.appendChild(blk.firstChild);
    blk.appendChild(u);
  });
}
function startEscapeMode(v,n,tasks,red){
  studentVorname=(v||"").trim(); studentNachname=(n||"").trim();
  $("who-name").textContent=(studentVorname+" "+studentNachname).trim();
  escapeRed=Array.isArray(red)?red:[];
  const prefill=(Array.isArray(tasks)&&tasks.length)?buildPrefill(tasks):"";
  const now=Date.now();
  setEditorText(prefill);
  underlinePrefillBlocks();   // vorbefüllte Aufgabenstellungen unterstreichen
  const serText=serializeEditor().text;   // tatsächlicher Editor-Text (Leerzeilen ggf. zusammengefasst)
  prevValue=serText;
  recs=serText.split("").map(()=>({src:"s",t:now}));   // vorbefüllter Text = System (grau, nicht gezählt)
  renderMoodleHints();
  updateCharcount();
  show("screen-editor");
  setTimeout(()=>{
    ed.focus();
    // Cursor in die erste leere Lösungszeile setzen
    const pf=prefill.split("\n");
    let bi=pf.indexOf(""); if(bi<0) bi=pf.length-1;
    const blocks=Array.prototype.filter.call(ed.childNodes,n=>n.nodeType===1);
    placeCaretAtBlockStart(blocks[bi]||blocks[blocks.length-1]);
  },50);
}
function readEscapePdf(file){
  $("esc-err").textContent="";
  const fr=new FileReader();
  fr.onload=()=>{
    const bytes=new Uint8Array(fr.result);
    let str=""; for(let i=0;i<bytes.length;i++) str+=String.fromCharCode(bytes[i]);
    const mm=str.match(/%ESCAPEDATA (\S+)/);
    if(!mm){$("esc-err").textContent="In dieser PDF wurden keine Escape-Room-Daten gefunden. Bitte lade die Überblick-PDF aus dem Escape-Room hoch.";return;}
    let d;
    try{ d=JSON.parse(decodeURIComponent(escape(atob(mm[1])))); }
    catch(e){ $("esc-err").textContent="Die Escape-Room-Daten konnten nicht gelesen werden."; return; }
    startEscapeMode(d.v,d.n,d.t,d.r);
  };
  fr.onerror=()=>{$("esc-err").textContent="Datei konnte nicht gelesen werden.";};
  fr.readAsArrayBuffer(file);
}
$("esc-input").addEventListener("change",e=>{const f=e.target.files[0];if(f)readEscapePdf(f);});

/* ---------- Rich-Text-Editor: Serialisierung & Formatierung ---------- */
/* Read-only: liest den contenteditable-Inhalt als {text, fmt} aus, OHNE das DOM
   oder den Cursor zu verändern. Inline-Formatierung ändert den Text nicht, nur fmt –
   dadurch bleiben die Tipp-Tempo-Daten (recs) über Formatierungen hinweg erhalten. */
function serializeEditor(){
  const root=$("editor");
  const chars=[]; const fmt=[];
  function isBlock(node){ return node.nodeType===1 && /^(DIV|P|H[1-6]|LI|BLOCKQUOTE|PRE)$/.test(node.tagName); }
  function lastIsNL(){ return chars.length===0 || chars[chars.length-1]==="\n"; }
  function pushCh(ch,st){ chars.push(ch); fmt.push({b:st.b,i:st.i,u:st.u,h:st.h}); }
  function lastChildOfBlock(node){
    const p=node.parentNode; return p && isBlock(p) && p.childNodes[p.childNodes.length-1]===node;
  }
  function walk(node, st){
    const kids=node.childNodes||[];
    for(let k=0;k<kids.length;k++){
      const child=kids[k];
      if(child.nodeType===3){
        const s=child.nodeValue||"";
        for(const ch of s) pushCh(ch, st);
      } else if(child.nodeType===1){
        const tag=child.tagName;
        if(tag==="BR"){
          if(lastChildOfBlock(child)){ /* Platzhalter-<br> -> kein Umbruch */ }
          else pushCh("\n", st);
          continue;
        }
        const ns={b:st.b,i:st.i,u:st.u,h:st.h};
        if(tag==="B"||tag==="STRONG") ns.b=true;
        if(tag==="I"||tag==="EM") ns.i=true;
        if(tag==="U"||tag==="INS") ns.u=true;
        const sty=child.style||{};
        const fw=sty.fontWeight; if(fw==="bold"||fw==="bolder"||(fw&&parseInt(fw,10)>=600)) ns.b=true;
        const fst=sty.fontStyle; if(fst&&String(fst).indexOf("italic")>=0) ns.i=true;
        const td=(sty.textDecorationLine||sty.textDecoration||""); if(String(td).indexOf("underline")>=0) ns.u=true;
        if(child.classList&&child.classList.contains("heading")){ ns.h=true; ns.b=true; }
        if(/^H[1-6]$/.test(tag)){ ns.h=true; ns.b=true; }
        try{ const cs=getComputedStyle(child); if(cs){ const w=cs.fontWeight; if(w==="bold"||w==="bolder"||(parseInt(w,10)>=600)) ns.b=true; if(String(cs.fontStyle||"").indexOf("italic")>=0) ns.i=true; } }catch(e){}
        if(isBlock(child) && !lastIsNL()) pushCh("\n", st);
        walk(child, ns);
      }
    }
  }
  walk(root, {b:false,i:false,u:false,h:false});
  return { text: chars.join(""), fmt };
}

/* Baut den Editor-Inhalt aus reinem Text neu auf (jede Zeile = ein Block-DIV). */
function setEditorText(plain){
  const root=$("editor"); root.innerHTML="";
  const lines=String(plain||"").split("\n");
  for(const line of lines){
    const div=document.createElement("div");
    if(line==="") div.appendChild(document.createElement("br"));
    else div.appendChild(document.createTextNode(line));
    root.appendChild(div);
  }
  if(root.childNodes.length===0){ const d=document.createElement("div"); d.appendChild(document.createElement("br")); root.appendChild(d); }
  updateEmpty();
}

/* Platzhalter ein-/ausblenden (CSS: #editor.empty::before) */
function updateEmpty(){
  const root=$("editor");
  root.classList.toggle("empty", serializeEditor().text.length===0);
}

/* Den Block (oberste DIV-Ebene im Editor), in dem ein Knoten liegt. */
function blockOf(node){
  const root=$("editor"); if(!node) return null;
  if(node===root){ return null; }
  let n=node;
  while(n && n.parentNode!==root) n=n.parentNode;
  return (n && n.parentNode===root && n.nodeType===1) ? n : null;
}
/* Alle Blöcke, die von der aktuellen Auswahl berührt werden. */
function selectedBlocks(){
  const root=$("editor"); const sel=window.getSelection();
  if(!sel||sel.rangeCount===0) return [];
  const r=sel.getRangeAt(0);
  let a=blockOf(r.startContainer), b=blockOf(r.endContainer);
  const blocks=Array.prototype.filter.call(root.childNodes,n=>n.nodeType===1);
  if(!a) a=blocks[0]; if(!b) b=blocks[blocks.length-1];
  if(!a||!b) return [];
  const ia=blocks.indexOf(a), ib=blocks.indexOf(b);
  if(ia<0||ib<0) return [];
  const lo=Math.min(ia,ib), hi=Math.max(ia,ib);
  return blocks.slice(lo,hi+1);
}
/* Überschrift für die ausgewählten Blöcke umschalten. */
function toggleHeading(){
  const blocks=selectedBlocks(); if(!blocks.length) return;
  const allHead=blocks.every(b=>b.classList.contains("heading"));
  blocks.forEach(b=>{ if(allHead) b.classList.remove("heading"); else b.classList.add("heading"); });
  $("editor").focus();
  updateFormatButtons();
}
/* Button-Zustände an die aktuelle Auswahl/Cursorposition anpassen. */
function updateFormatButtons(){
  const q=(c)=>{ try{ return document.queryCommandState(c); }catch(e){ return false; } };
  $("fb-bold").classList.toggle("active", q("bold"));
  $("fb-italic").classList.toggle("active", q("italic"));
  $("fb-underline").classList.toggle("active", q("underline"));
  const blocks=selectedBlocks();
  const head = blocks.length>0 && blocks.every(b=>b.classList.contains("heading"));
  $("fb-heading").classList.toggle("active", head);
}
/* Inline-Befehl (bold/italic/underline) ausführen; Auswahl bleibt erhalten. */
function execInline(cmd){
  $("editor").focus();
  try{ document.execCommand(cmd,false,null); }catch(e){}
  updateFormatButtons();
  updateEmpty();
}
/* Cursor an den Anfang eines Blocks setzen. */
function placeCaretAtBlockStart(block){
  if(!block) return;
  const sel=window.getSelection(); const r=document.createRange();
  r.setStart(block,0); r.collapse(true);
  sel.removeAllRanges(); sel.addRange(r);
}

/* Editor-Tracking */
const ed=$("editor");
ed.addEventListener("paste",(e)=>{
  // Nur reinen Text einfügen, damit das DOM sauber bleibt (keine fremde Formatierung)
  if(e.clipboardData){
    e.preventDefault();
    const txt=e.clipboardData.getData("text/plain");
    justPasted=true;
    try{ document.execCommand("insertText",false,txt); }
    catch(err){ justPasted=true; }
  } else { justPasted=true; }
});
ed.addEventListener("drop",()=>{justPasted=true;});
ed.addEventListener("keydown",(e)=>{
  // Strg/Cmd+B/I/U: Browser formatiert selbst; danach Button-Status aktualisieren
  if((e.ctrlKey||e.metaKey)&&!e.altKey){
    const k=e.key.toLowerCase();
    if(k==="b"||k==="i"||k==="u"){ setTimeout(()=>{ updateFormatButtons(); updateEmpty(); },0); }
  }
  // Enter in einer Überschrift: neue Zeile soll normal sein
  if(e.key==="Enter"){
    setTimeout(()=>{
      const blocks=selectedBlocks();
      blocks.forEach(b=>{ const txt=(b.textContent||"").replace(/\u200B/g,""); if(b.classList.contains("heading")&&txt==="") b.classList.remove("heading"); });
      updateFormatButtons();
    },0);
  }
});
ed.addEventListener("input",()=>{
  reconcile(serializeEditor().text,justPasted,Date.now());
  justPasted=false;
  updateCharcount();
  updateEmpty();
});
ed.addEventListener("keyup",updateFormatButtons);
ed.addEventListener("mouseup",updateFormatButtons);
document.addEventListener("selectionchange",()=>{ if(document.activeElement===$("editor")) updateFormatButtons(); });

/* Formatierungsleiste verdrahten – mousedown + preventDefault, damit die Auswahl erhalten bleibt */

/* Export: erzeugt NUR die Text-PDF (mit rotem Moodle-Hinweis); die Tracking-Daten stecken
   verschlüsselt als %TRACKDATA in der PDF und sind über „Lehrkraft → PDF laden + Code" auslesbar */
$("export-btn").addEventListener("click",async()=>{
  const btn=$("export-btn"); const ser=serializeEditor(); const text=ser.text; const fmt=ser.fmt;
  const name=studentVorname+" "+studentNachname;
  btn.disabled=true; const old=btn.textContent; btn.textContent="Erzeuge PDF…";
  try{
    const payload=buildPayload(name,text,fmt);
    const code=_kf(studentVorname);
    const bundle=await aesEncrypt(JSON.stringify(payload),code);

    const pdfName=fileSafe("Text von "+studentVorname)+".pdf";

    // PDF: formatierter Text + roter Moodle-Hinweis; Tracking-Daten stecken (verschlüsselt) als %TRACKDATA drin
    const pdfStr=buildPdf({name,text,fmt,trackB64:bundle});
    const u8=new Uint8Array(pdfStr.length);
    for(let i=0;i<pdfStr.length;i++)u8[i]=pdfStr.charCodeAt(i)&0xFF;

    downloadBlob(new Blob([u8],{type:"application/pdf"}), pdfName);

    btn.textContent="PDF erstellt ✓";
    setTimeout(()=>{ btn.textContent=old; }, 2200);
  }catch(err){ alert("Fehler beim Erzeugen der PDF: "+err.message); btn.textContent=old; }
  finally{ btn.disabled=false; }
});

<script>
"use strict";

/* ============================================================
   KONFIGURATION
   ============================================================ */
const CODE_WORD = 'SPAREN';
const MAGIC = 26;


/* ============================================================
   STATE
   ============================================================ */
let state = {
  screen:'start',
  firstName:'', lastName:'', birthDate:'',
  code:'',
  solved:[false,false,false,false,false,false],
  letters:['_','_','_','_','_','_'],
  mistakes:[null,null,null,null,null,null],
  attempts:[0,0,0,0,0,0],
  completedAt:null,
};
window.state = state;

function recordAttempt(roomIdx, errorData){
  state.attempts[roomIdx]++;
  if(state.attempts[roomIdx] === 1 && errorData && errorData.errors && errorData.errors.length > 0){
    state.mistakes[roomIdx] = errorData;
  }
}

function computeCode(birthDigits){
  // birthDigits = "TTMMJJJJ"  ->  Zahl × 1104 + magische Zahl
  const n = parseInt(birthDigits, 10);
  return String(n * 1104 + MAGIC);
}

/* zufällige Reihenfolge */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
/* nach Buchstabenmenge sortieren (neutral, verrät nichts) */
function sortByLen(arr, keyFn){
  return arr.slice().sort((x,y)=> keyFn(x).length - keyFn(y).length);
}
function normalize(s){ return (s||'').toLowerCase().replace(/[^a-z0-9äöüß ]/g,'').replace(/\s+/g,' ').trim(); }

const WIN_ANSI_MAP = {
  'ä':0xE4,'ö':0xF6,'ü':0xFC,'Ä':0xC4,'Ö':0xD6,'Ü':0xDC,'ß':0xDF,
  '€':0x80,'‚':0x82,'„':0x84,'…':0x85,'†':0x86,'‡':0x87,
  '‰':0x89,'‹':0x8B,"\u2018":0x91,"\u2019":0x92,"\u201C":0x93,"\u201D":0x94,
  '•':0x95,'–':0x96,'—':0x97,'™':0x99,'›':0x9B,
  '¡':0xA1,'«':0xAB,'»':0xBB,'·':0xB7,'×':0xD7,'°':0xB0,
  '²':0xB2,'³':0xB3,'½':0xBD,'¼':0xBC,'¾':0xBE,'¿':0xBF,
};
const FALLBACK_MAP = {
  '→':'->','←':'<-','↑':'^','↓':'v','✓':'v','✗':'x','✕':'x','★':'*','☆':'*',
  '\u00A0':' ','\u2009':' ','\u200B':'',
};
function encodeWinAnsi(str){
  const bytes=[];
  for(const ch of str){
    const code=ch.charCodeAt(0);
    if(code<128) bytes.push(code);
    else if(WIN_ANSI_MAP[ch]!==undefined) bytes.push(WIN_ANSI_MAP[ch]);
    else if(FALLBACK_MAP[ch]!==undefined){ for(const sub of FALLBACK_MAP[ch]) bytes.push(sub.charCodeAt(0)&0xFF); }
    else if(code<=255) bytes.push(code);
    else bytes.push(0x3F);
  }
  return bytes;
}
const HELV_W=(()=>{
  const w=new Array(256).fill(500);
  const widths={' ':278,'!':278,'"':355,'#':556,'$':556,'%':889,'&':667,"'":191,'(':333,')':333,'*':389,'+':584,',':278,'-':333,'.':278,'/':278,'0':556,'1':556,'2':556,'3':556,'4':556,'5':556,'6':556,'7':556,'8':556,'9':556,':':278,';':278,'<':584,'=':584,'>':584,'?':556,'@':1015,'A':667,'B':667,'C':722,'D':722,'E':667,'F':611,'G':778,'H':722,'I':278,'J':500,'K':667,'L':556,'M':833,'N':722,'O':778,'P':667,'Q':778,'R':722,'S':667,'T':611,'U':722,'V':667,'W':944,'X':667,'Y':667,'Z':611,'[':278,'\\':278,']':278,'^':469,'_':556,'`':333,'a':556,'b':556,'c':500,'d':556,'e':556,'f':278,'g':556,'h':556,'i':222,'j':222,'k':500,'l':222,'m':833,'n':556,'o':556,'p':556,'q':556,'r':333,'s':500,'t':278,'u':556,'v':500,'w':722,'x':500,'y':500,'z':500,'{':334,'|':260,'}':334,'~':584,'ä':556,'ö':556,'ü':556,'Ä':667,'Ö':778,'Ü':722,'ß':611,'€':556,'–':556,'—':1000,'«':556,'»':556,'·':278,'°':400,'•':350};
  for(const k in widths){ const code=WIN_ANSI_MAP[k]!==undefined?WIN_ANSI_MAP[k]:k.charCodeAt(0); if(code<256) w[code]=widths[k]; }
  return w;
})();
function pdfStringWidth(str,fontSize,isBold){
  const bytes=encodeWinAnsi(str); let total=0;
  for(const b of bytes) total += (HELV_W[b]||500)*(isBold?1.04:1);
  return total*fontSize/1000;
}
class PdfDoc{
  constructor(){ this.pages=[]; this.pageW=595; this.pageH=842; this.margin=56; this.cursorY=0; this.currentContent=[]; }
  startPage(){ this.cursorY=this.pageH-this.margin; this.currentContent=[]; }
  endPage(){ this.pages.push({content:this.currentContent.join('\n')}); }
  _escapedString(str){
    const bytes=encodeWinAnsi(str); let s='(';
    for(const b of bytes){ if(b===0x28||b===0x29||b===0x5C) s+='\\'; s+=String.fromCharCode(b); }
    return s+')';
  }
  text(str,x,y,fontSize,isBold,color){
    const fontKey=isBold?'F2':'F1'; const c=color||[0,0,0]; const pdfStr=this._escapedString(str);
    this.currentContent.push(`${c[0]/255} ${c[1]/255} ${c[2]/255} rg\nBT\n/${fontKey} ${fontSize} Tf\n${x} ${y} Td\n${pdfStr} Tj\nET`);
  }
  rect(x,y,w,h,fill,stroke){
    let cmd='';
    if(fill) cmd+=`${fill[0]/255} ${fill[1]/255} ${fill[2]/255} rg\n`;
    if(stroke) cmd+=`${stroke[0]/255} ${stroke[1]/255} ${stroke[2]/255} RG\n`;
    cmd+=`${x} ${y} ${w} ${h} re\n`;
    if(fill&&stroke) cmd+='B'; else if(fill) cmd+='f'; else if(stroke) cmd+='S';
    this.currentContent.push(cmd);
  }
  line(x1,y1,x2,y2,color,width){
    const c=color||[0,0,0];
    this.currentContent.push(`${c[0]/255} ${c[1]/255} ${c[2]/255} RG\n${width||0.5} w\n${x1} ${y1} m ${x2} ${y2} l S`);
  }
  paragraph(str,x,y,width,fontSize,isBold,color,leading){
    if(!leading) leading=fontSize*1.4;
    const words=String(str).split(/\s+/); let line=''; let curY=y;
    for(const word of words){
      if(!word) continue;
      const test=line?line+' '+word:word;
      if(pdfStringWidth(test,fontSize,isBold)<=width){ line=test; }
      else{
        if(line){ this.text(line,x,curY,fontSize,isBold,color); curY-=leading; line=word; }
        else{ this.text(word,x,curY,fontSize,isBold,color); curY-=leading; }
      }
    }
    if(line){ this.text(line,x,curY,fontSize,isBold,color); curY-=leading; }
    return curY;
  }
  build(){
    const objects=[null,null,
      '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>',
      '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>'];
    const pageIds=[];
    for(const page of this.pages){
      objects.push(`<< /Length ${page.content.length} >>\nstream\n${page.content}\nendstream`);
      const contentId=objects.length;
      objects.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${this.pageW} ${this.pageH}] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents ${contentId} 0 R >>`);
      pageIds.push(objects.length);
    }
    objects[1]=`<< /Type /Pages /Kids [${pageIds.map(i=>i+' 0 R').join(' ')}] /Count ${pageIds.length} >>`;
    objects[0]='<< /Type /Catalog /Pages 2 0 R >>';
    let pdf='%PDF-1.4\n%\xC4\xC5\xC6\xC7\n'; const offsets=[0];
    for(let i=0;i<objects.length;i++){ offsets.push(pdf.length); pdf+=`${i+1} 0 obj\n${objects[i]}\nendobj\n`; }
    const xrefOffset=pdf.length;
    pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
    for(let i=1;i<=objects.length;i++) pdf+=String(offsets[i]).padStart(10,'0')+' 00000 n \n';
    pdf+=`trailer\n<< /Size ${objects.length+1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF\n`;
    return pdf;
  }
  toBase64(trailerComment){ let pdf=this.build(); if(trailerComment) pdf+=trailerComment; return btoa(pdf); }
}

function fmtDateTime(d){
  if(!d) d=new Date();
  const date=d.toLocaleDateString('de-DE');
  const time=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  return date+', '+time+' Uhr';
}

const RED_FIELDS = [
  'Wandle diesen Text nun in eine PDF-Datei um und lade diese PDF-Datei in der korrekten Abgabe auf Moodle hoch.',
];

function generateReflexionPdf(){
  const doc=new PdfDoc();
  const W=doc.pageW,H=doc.pageH,M=doc.margin; const CW=W-2*M;
  const PRIMARY=[184,134,11], ACCENT=[166,124,0], MUTE=[106,120,150], TEXT=[42,26,12], LINE=[205,205,205];

  function header(){
    doc.startPage();
    doc.rect(0,H-72,W,72,PRIMARY);
    doc.text('Reflexion — Finanzielle Bildung',M,H-38,18,true,[255,255,255]);
    doc.text('Escape-Room „Das Vermögensgeheimnis" · Bearbeite die Aufgaben in eigenen Worten',M,H-58,9,false,[252,240,205]);
    return H-72-22;
  }
  function ensure(y,need){ if(y-need<70){ doc.endPage(); return header(); } return y; }

  let y=header();

  // Identifikationsblock: Name, Geburtsdatum, Zeitpunkt der Vollendung
  const bH=58;
  doc.rect(M,y-bH,CW,bH,[252,243,214]);
  doc.rect(M,y-bH,3,bH,ACCENT);
  doc.text('NAME',M+14,y-15,8,true,ACCENT);
  doc.text(state.firstName+' '+state.lastName,M+14,y-30,12.5,true,PRIMARY);
  doc.text('GEBURTSDATUM',M+260,y-15,8,true,ACCENT);
  doc.text(state.birthDate,M+260,y-30,11,false,TEXT);
  doc.text('ESCAPE-ROOM ABGESCHLOSSEN AM',M+14,y-46,8,true,ACCENT);
  doc.text(fmtDateTime(state.completedAt),M+200,y-46,10,false,TEXT);
  y-=bH+16;

  y=doc.paragraph('Diese Reflexion vertieft die Inhalte aus den Bibliotheksräumen. Beantworte die folgenden Aufgaben in eigenen Worten – stichpunktartig oder in ganzen Sätzen.',
    M,y,CW,10.5,false,TEXT,14);
  y-=8;

  for(let i=0;i<REFLECT_TASKS.length;i++){
    const isLast=i===REFLECT_TASKS.length-1;
    const isSecondLast=i===REFLECT_TASKS.length-2;
    y=ensure(y,isLast||isSecondLast?70:120);
    doc.text('Aufgabe '+(i+1),M,y,11,true,ACCENT);
    y-=15;
    y=doc.paragraph(REFLECT_TASKS[i],M,y,CW,11,true,TEXT,15);
    y-=8;
    if(isLast || isSecondLast){
      doc.rect(M,y-12,12,12,null,MUTE);
      doc.text('erledigt',M+20,y-10,9.5,false,MUTE);
      y-=26;
    } else {
      const linesCount=4;
      for(let l=0;l<linesCount;l++){ y-=20; doc.line(M,y,M+CW,y,LINE,0.5); }
      y-=14;
    }
  }

  y=ensure(y,30);
  doc.line(M,y,M+CW,y,LINE,0.4); y-=14;
  doc.text('Copyright Jan-Rickmer Feindt',M,y,8.5,false,MUTE);
  doc.endPage();
  return doc.toBase64();
}

/* ============================================================

   ============================================================ */
function translit(s){
  return (s||'').replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue')
    .replace(/Ä/g,'Ae').replace(/Ö/g,'Oe').replace(/Ü/g,'Ue').replace(/ß/g,'ss')
    .replace(/[^a-zA-Z0-9-]/g,'');
}
function downloadPdfBase64(b64,filename){
  const binary=atob(b64); const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  const blob=new Blob([bytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a'); link.href=url; link.download=filename;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(url),1200);
}
window.downloadOverviewPDF=()=>{
  try{
    const b64=generateOverviewPdf();
    const safe=s=>(s||'').trim().replace(/[\\/:*?"<>|]+/g,'').replace(/\s+/g,'-');
    const fn=safe(state.firstName)||'Vorname', ln=safe(state.lastName)||'Nachname';
    const filename=`Escape-Room-Überblick_von_${fn}_${ln}.pdf`;
    const binary=atob(b64); const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');                                   // 1) PDF im neuen Tab öffnen
    const link=document.createElement('a'); link.href=url; link.download=filename;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);  // 2) gleichzeitig herunterladen
    setTimeout(()=>URL.revokeObjectURL(url),60000);              // Object-URL erst spät freigeben
  }catch(e){ console.error(e); alert('Konnte die Datei nicht erzeugen: '+e.message); }
};
window.downloadReflexionPDF=()=>{
  try{
    const b64=generateReflexionPdf();
    const name=translit(state.lastName)||'Schueler';
    downloadPdfBase64(b64,`Reflexion_${name}_${state.code}.pdf`);
  }catch(e){ console.error(e); alert('Konnte die Datei nicht erzeugen: '+e.message); }
};

/* ============================================================
   DIGITALES ARBEITSBLATT IM FEIDITOR (Programmierung wie im Referenz-Escape-Room)
   ============================================================ */
window.openFeiditor=()=>{
  try{
    const tplEl=document.getElementById('feiditor-src');
    if(!tplEl){ alert('Der Feiditor konnte nicht geladen werden.'); return; }
    // Eingebetteten Feiditor-Quelltext holen und die escapten Script-End-Tags wiederherstellen
    let html=tplEl.textContent.replace(/<\\\/script>/gi,'<\/script>');
    // Escape-Room-Daten + die ersten sechs Aufgaben in den Feiditor injizieren (vor </head>)
    const data={
      firstName: state.firstName,
      lastName:  state.lastName,
      birthDate: state.birthDate,
      code:      state.code,
      tasks:     REFLECT_TASKS.slice(0,6),
      red:       RED_FIELDS
    };
    const inject='<script>window.__ESCAPE_DATA__='+JSON.stringify(data).replace(/</g,'\\u003c')+';<\/script>';
    if(html.indexOf('</head>')!==-1) html=html.replace('</head>', inject+'\n</head>');
    else html=inject+html;
    // Per document.write öffnen, damit der sichere Kontext (crypto.subtle) erhalten bleibt.
    // Ein Blob-URL würde den secure context verlieren -> Verschlüsselung schlägt fehl.
    const win=window.open('','_blank');
    if(!win){ alert('Bitte erlaube Pop-ups für diese Seite, damit sich das digitale Arbeitsblatt öffnen kann.'); return; }
    win.document.open();
    win.document.write(html);
    win.document.close();
  }catch(e){ console.error(e); alert('Das digitale Arbeitsblatt konnte nicht geöffnet werden: '+e.message); }
};

window.maskBirth=(el)=>{
  let v=el.value.replace(/[^0-9]/g,'').slice(0,8);
  let out=v;
  if(v.length>4) out=v.slice(0,2)+'.'+v.slice(2,4)+'.'+v.slice(4);

window.submitStart=()=>{
  const fn=document.getElementById('firstNameInput').value.trim();

  const bd=document.getElementById('birthInput').value.trim();
  const err=document.getElementById('startError');

  if(fn.length<2||ln.length<2){ showErr('Bitte trage deinen vollen Vor- und Nachnamen ein (jeweils mindestens 2 Zeichen).'); return; }
  const m=bd.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(!m){ showErr('Bitte gib dein Geburtsdatum im Format TT.MM.JJJJ ein (z. B. 07.03.2010).'); return; }
  const dd=parseInt(m[1],10), mm=parseInt(m[2],10), yyyy=parseInt(m[3],10);
  if(dd<1||dd>31||mm<1||mm>12||yyyy<1900||yyyy>2026){ showErr('Das Geburtsdatum scheint nicht zu stimmen. Bitte prüfe Tag, Monat und Jahr.'); return; }
  state.firstName=fn; state.lastName=ln; state.birthDate=bd;
  const digits=m[1]+m[2]+m[3];
  state.code=computeCode(digits);
  renderIntro();
};
