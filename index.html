            <text x="286" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#8c6608" font-family="Hanken Grotesk, sans-serif">Verfügbarkeit</text>
            <text x="160" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#9a7d1a" font-family="IBM Plex Mono, monospace">KOMPROMISS</text>
            <text x="160" y="138" text-anchor="middle" font-size="9" fill="#8a7c54" font-family="Hanken Grotesk, sans-serif">man kann nie alle drei zugleich</text>
          </svg>
        </div>
        <ul class="lib-bullets">
          <li><strong>Rendite</strong> – wie viel Gewinn die Anlage abwirft.</li>
          <li><strong>Sicherheit</strong> – wie gut sie vor Verlust geschützt ist.</li>
          <li><strong>Verfügbarkeit</strong> – wie schnell man wieder an sein Geld kommt.</li>
        </ul>
        <div class="lib-note"><b>Die Regel dahinter:</b>&nbsp; Mehr Rendite bedeutet meist <strong>weniger</strong> Sicherheit. Hohe Sicherheit und Verfügbarkeit bedeuten meist <strong>wenig</strong> Rendite.</div>
      </div>

      <div class="lib-section">
        <div class="lib-section-title">Sicher oder renditestark?</div>
        <div class="lib-grid">
          <div class="lib-card">
            <div class="lib-card-sub">eher sicher, wenig Rendite</div>
            <div class="lib-card-title">Sparbuch · Tagesgeld · Festgeld</div>
            <div class="lib-card-body">Dein Geld ist gut geschützt, wächst aber nur langsam.</div>
          </div>
          <div class="lib-card">
            <div class="lib-card-sub">mehr Rendite, mehr Risiko</div>
            <div class="lib-card-title">Aktien · Aktienfonds · ETF</div>
            <div class="lib-card-body">Höhere Renditechancen, dafür schwanken die Werte und Verluste sind möglich.</div>
          </div>
        </div>
        <div class="lib-note" style="margin-top:12px;"><b>Merke:</b>&nbsp; Die eine „beste" Geldanlage gibt es nicht. Jede Form ist ein Kompromiss – welcher passt, hängt vom Ziel ab.</div>
      </div>`,
    target:'Notiz 1 · Das magische Dreieck' },

  // --- Notizzettel 2: Vertraue keiner Bank blind ---
  { id:2, location:'Notizzettel 2 · Vorderseite (Wissen)', name:'Vertraue keiner Bank blind',
    intro:'Konrad hat erlebt, dass Banken nicht automatisch sicher sind. Sein zweiter Zettel erklärt, warum man nachfragen sollte – und was wirklich geschützt ist.',
    content:`
      <div class="lib-section">
        <div class="lib-section-title">Was 2008 geschah</div>
        <p>In der <strong>Finanzkrise 2008</strong> hatten viele Banken riskante Kredite – vor allem faule US-Immobilienkredite – vergeben und weiterverkauft. Als die Blase platzte, gerieten Banken weltweit in Schieflage; die große US-Bank <strong>Lehman Brothers</strong> ging sogar pleite.</p>
        <div class="lib-card" style="margin-top:6px;">
          <div class="lib-card-sub">Das Problem für Privatkunden</div>
          <div class="lib-card-title">Zertifikate – nicht geschützt</div>
          <div class="lib-card-body">Damals wurden auch Produkte wie <strong>Zertifikate</strong> an sicherheitsorientierte Privatkunden verkauft, die gar <strong>nicht durch die Einlagensicherung geschützt</strong> waren. Als die Bank pleiteging, war das Geld weg.</div>
        </div>
        <div class="lib-note" style="margin-top:12px;"><b>Die Lehre:</b>&nbsp; Nicht blind vertrauen. <strong>Nachfragen</strong>, das Kleingedruckte und die Risiken prüfen und verstehen, was man überhaupt kauft.</div>
      </div>

      <div class="lib-section">
        <div class="lib-section-title">Die Einlagensicherung</div>
        <p>Für Guthaben auf <strong>Giro-, Tagesgeld- und Festgeldkonten</strong> gibt es einen gesetzlichen Schutz:</p>
        <ul class="lib-bullets">
          <li>In der gesamten EU sind <strong>100.000 € pro Kunde und Bank</strong> gesetzlich abgesichert – darauf hat man einen <strong>Rechtsanspruch</strong>.</li>
          <li>In Deutschland kommt bei vielen Banken zusätzlich ein <strong>freiwilliger</strong> Schutz hinzu, der oft weit über 100.000 € hinausgeht.</li>
        </ul>
        <div class="lib-note" style="margin-top:6px;"><b>Vorsicht im Ausland:</b>&nbsp; Es gibt <strong>kein gemeinsames EU-System</strong> – jedes Land sichert selbst ab. Außerhalb der EU kann der Schutz schwächer sein oder ganz fehlen.</div>
        <div class="lib-note" style="margin-top:10px; background:var(--error-bg); border-color:var(--error);"><b>Wichtig:</b>&nbsp; <strong>Aktien, Fonds und Zertifikate</strong> fallen <strong>nicht</strong> unter die Einlagensicherung – sie ist nur für Kontoguthaben gedacht.</div>
      </div>`,
    target:'Notiz 2 · Vertraue keiner Bank blind' },

  // --- Notizzettel 3: Tagesgeld & Festgeld ---
  { id:3, location:'Notizzettel 3 · Vorderseite (Wissen)', name:'Tagesgeld und Festgeld im Vergleich',
    intro:'Zwei sichere Sparformen, ein wichtiger Unterschied. Konrads dritter Zettel stellt Tagesgeld und Festgeld gegenüber.',
    content:`
      <div class="lib-section">
        <div class="lib-grid">
          <div class="lib-card">
            <div class="lib-card-sub">jederzeit verfügbar</div>
            <div class="lib-card-title">Tagesgeld</div>
            <div class="lib-card-body">Du kommst <strong>jederzeit</strong> an dein Geld („tagesfällig"). Der Zins ist <strong>variabel</strong> – die Bank kann ihn nach oben oder unten anpassen. Gut als <strong>flexible Rücklage</strong>, z. B. für einen Notgroschen.</div>
          </div>
          <div class="lib-card">
            <div class="lib-card-sub">fest gebunden</div>
            <div class="lib-card-title">Festgeld</div>
            <div class="lib-card-body">Du legst einen festen Betrag für eine <strong>feste Laufzeit</strong> (z. B. 1, 2 oder 5 Jahre) zu einem <strong>festen Zins</strong> an. Der Zins ist garantiert und meist <strong>höher</strong> – dafür ist das Geld <strong>gebunden</strong>.</div>
          </div>
        </div>
      </div>

      <div class="lib-section">
        <div class="lib-section-title">Direkter Vergleich</div>
        <table class="lib-table">
          <thead><tr><th>&nbsp;</th><th>Tagesgeld</th><th>Festgeld</th></tr></thead>
          <tbody>
            <tr><td><strong>Verfügbarkeit</strong></td><td>jederzeit</td><td>erst am Laufzeitende</td></tr>
            <tr><td><strong>Zinssatz</strong></td><td>variabel (änderbar)</td><td>fest für die ganze Laufzeit</td></tr>
            <tr><td><strong>Höhe des Zinses</strong></td><td>meist niedriger</td><td>meist höher</td></tr>
            <tr><td><strong>Gut geeignet für</strong></td><td>flexible Rücklage / Notgroschen</td><td>Geld, das man eine Weile sicher nicht braucht</td></tr>
          </tbody>
        </table>
        <div class="lib-note" style="margin-top:12px;"><b>Faustregel:</b>&nbsp; Tagesgeld für Geld, das <strong>flexibel verfügbar</strong> bleiben soll. Festgeld für Beträge, die man eine Weile entbehren kann und <strong>fest planbar</strong> verzinst haben möchte.</div>
      </div>`,
    target:'Notiz 3 · Tagesgeld & Festgeld' },

  // --- Notizzettel 4: Zins & Fonds ---
  { id:4, location:'Notizzettel 4 · Vorderseite (Wissen)', name:'Zins und Fonds',
    intro:'Was ist ein Zins überhaupt – und wie senkt ein Fonds das Risiko? Konrads vierter Zettel klärt beides.',
    content:`
      <div class="lib-section">
        <div class="lib-section-title">Der Zins – der „Preis für Geld"</div>
        <p>Der Zins ist im Kern der <strong>Preis für Geld</strong>: Wer der Bank Geld überlässt, bekommt dafür einen Zins (<strong>Habenzins</strong>); wer sich Geld leiht, zahlt einen Zins (<strong>Sollzins</strong>). Der Zinssatz wird in <strong>Prozent pro Jahr</strong> angegeben (kurz <strong>% p. a.</strong> = pro Jahr).</p>
        <div class="lib-card" style="margin-top:6px;">
          <div class="lib-card-sub">Zinsen fallen zeitanteilig an</div>
          <div class="lib-card-title">Rechenbeispiel</div>
          <div class="lib-card-body"><strong>1.000 €</strong> zu <strong>3 % p. a.</strong> bringen in <strong>einem ganzen Jahr 30 €</strong> Zinsen. Legt man das Geld nur ein <strong>halbes Jahr</strong> an, ist es entsprechend die Hälfte: <strong>15 €</strong>.</div>
        </div>
      </div>

      <div class="lib-section">
        <div class="lib-section-title">Der Fonds – viele Anleger, ein Topf</div>
        <p>Ein <strong>Fonds</strong> bündelt das Geld vieler Anleger in einem gemeinsamen Topf und investiert breit in <strong>viele</strong> Wertpapiere. Der große Vorteil ist die <strong>Streuung</strong> (Fachwort: Diversifikation).</p>
        <div class="lib-note"><b>Streuung heißt:</b>&nbsp; <em>nicht alle Eier in einen Korb legen</em>. Statt alles auf einen einzigen Wert zu setzen, verteilt der Fonds das Geld auf viele. Fällt einer, können andere das auffangen – so <strong>sinkt das Risiko</strong>.</div>
        <ul class="lib-bullets" style="margin-top:12px;">
          <li><strong>Arten:</strong> u. a. Aktien-, Renten-, Misch- und Immobilienfonds.</li>
          <li><strong>Aktiv gemanagt:</strong> ein Fondsmanager wählt die Werte aus – meist teurer.</li>
          <li><strong>Passiv / ETF:</strong> bildet einfach einen Index (z. B. einen Aktienindex) nach – meist günstiger.</li>
        </ul>
      </div>`,
    target:'Notiz 4 · Zins & Fonds' },

  // --- Notizzettel 5: Steuern auf Erträge ---
  { id:5, location:'Notizzettel 5 · Vorderseite (Wissen)', name:'Steuern auf Erträge',
    intro:'Auch der Staat verdient an deinen Erträgen mit – aber es gibt einen Freibetrag. Konrads fünfter Zettel erklärt, wie das funktioniert.',
    content:`
      <div class="lib-section">
        <div class="lib-section-title">Die Abgeltungssteuer</div>
        <p>Erträge aus Geldanlagen – also <strong>Zinsen, Dividenden und realisierte Kursgewinne</strong> – muss man in Deutschland versteuern. Dafür gibt es die <strong>Abgeltungssteuer</strong>:</p>
        <ul class="lib-bullets">
          <li><strong>25 %</strong> der Erträge gehen als Steuer ans Finanzamt.</li>
          <li>Hinzu kommen Solidaritätszuschlag und ggf. Kirchensteuer – zusammen sind es rund <strong>26 %</strong>.</li>
        </ul>
      </div>

      <div class="lib-section">
        <div class="lib-section-title">Der Sparerpauschbetrag – dein Freibetrag</div>
        <p>Es gibt aber einen wichtigen Trost: den <strong>Sparerpauschbetrag</strong>. Er ist ein <strong>Freibetrag</strong> – bis zu seiner Grenze bleiben deine Erträge <strong>steuerfrei</strong>, erst darüber fällt Steuer an.</p>
        <ul class="lib-bullets">
          <li><strong>1.000 € pro Jahr</strong> sind steuerfrei (bei gemeinsam veranlagten Ehepaaren <strong>2.000 €</strong>).</li>
          <li>Beispiel: Wer <strong>1.500 €</strong> Erträge hat, zahlt nur auf die <strong>500 €</strong> über dem Freibetrag Steuer.</li>
          <li>Den Freibetrag kann man auf <strong>mehrere Banken aufteilen</strong> – solange die Summe 1.000 € nicht übersteigt.</li>
        </ul>
      </div>

      <div class="lib-section">
        <div class="lib-section-title">Der Freistellungsauftrag</div>
        <p>Damit die Bank den Freibetrag berücksichtigt, musst du ihr einen <strong>Freistellungsauftrag</strong> erteilen.</p>
        <div class="lib-note" style="background:var(--error-bg); border-color:var(--error);"><b>Aufpassen:</b>&nbsp; Vergisst du den Freistellungsauftrag, zieht die Bank die Steuer <strong>automatisch</strong> ab und führt sie ans Finanzamt. Zurückholen kannst du sie dann nur noch über die <strong>Steuererklärung</strong>.</div>
      </div>`,
    target:'Notiz 5 · Steuern auf Erträge' },

  // --- Notizzettel 6: Der Zinseszinseffekt ---
  { id:6, location:'Notizzettel 6 · Vorderseite (Wissen)', name:'Der Zinseszinseffekt',
    intro:'Konrads letzter und wichtigster Zettel: der Hebel, der hinter seinem ganzen Vermögen steckt.',
    content:`
      <div class="lib-section">
        <div class="lib-section-title">Zinsen auf Zinsen</div>
        <p>Der <strong>Zinseszinseffekt</strong> ist einer der wichtigsten Hebel beim langfristigen Sparen. Die Idee: Lässt man die Zinsen <strong>liegen</strong>, statt sie auszugeben, werden im nächsten Jahr <strong>auch diese Zinsen wieder mitverzinst</strong> – man bekommt „Zinsen auf die Zinsen". Dadurch wächst das Vermögen nicht gleichmäßig, sondern <strong>immer schneller</strong>.</p>
        <div class="lib-card" style="margin-top:6px;">
          <div class="lib-card-sub">Beispiel: 1.000 € zu 5 %</div>
          <div class="lib-card-title">Es wird jedes Jahr mehr</div>
          <div class="lib-card-body">Im ersten Jahr gibt es <strong>50 €</strong> Zinsen (auf 1.000 €). Im zweiten Jahr werden 1.050 € verzinst – das sind schon <strong>52,50 €</strong>, also mehr als im Vorjahr, <strong>obwohl der Zinssatz gleich bleibt</strong>.</div>
        </div>

        </div>

  root.innerHTML=`${roomHeader(room)}<div class="card"><div class="part-label">Teil 1 · Auswahlfragen</div>${mc}</div>${part2}${roomFooter('Teil 1: Der Sparerpauschbetrag macht Erträge bis 1.000 € steuerfrei; ohne Freistellungsauftrag zieht die Bank die Steuer automatisch ab. Teil 2: Versteuert wird nur der Gewinn (die Erträge), nicht das ganze angelegte Geld (die Anlagesumme); im Beispiel 1.500 € minus 1.000 € Freibetrag.','checkR5()')}`;
}
window.pickR5=(qi,oi)=>{
  if(r5Submitted) return;
  r5Choice[qi]=oi;
  r5Opts[qi].forEach((o,k)=>document.getElementById('r5mc-'+qi+'-'+k).classList.toggle('selected',k===oi));
};
window.checkR5=()=>{
  if(r5Choice.includes(null)){ showStatus('warning','Noch unvollständig','Bitte beantworte beide Auswahlfragen in Teil 1.'); return; }
  let allCorrect=true; const errors=[];
  R5_MC.forEach((qq,qi)=>{
    const chosen=r5Choice[qi]; const correctIdx=r5Opts[qi].findIndex(o=>o.correct); const okay=r5Opts[qi][chosen].correct;
    const el=document.getElementById('r5mc-'+qi+'-'+chosen); el.classList.remove('selected'); el.classList.add(okay?'correct':'incorrect');
    if(!okay){ allCorrect=false; document.getElementById('r5mc-'+qi+'-'+correctIdx).classList.add('correct'); errors.push({kind:'mc_falsch', item:(qi+1)+'. '+qq.q, wrongAnswer:r5Opts[qi][chosen].t, correctAnswer:r5Opts[qi][correctIdx].t}); }
  });
  R5_FREE.forEach(f=>{
    const ip=document.getElementById('r5f-'+f.id); ip.classList.remove('ok','bad');
    if(f.accept.includes(normalize(ip.value))) ip.classList.add('ok');
    else{ ip.classList.add('bad'); allCorrect=false; errors.push({kind:'falsche_eingabe', item:'Teil 2 · Lücke '+f.id, wrongAnswer:ip.value||'(leer)', correctAnswer:f.correct}); }
  });
  recordAttempt(4,{errors});
  if(allCorrect){ r5Submitted=true; showStatus('success','Richtig','Du verstehst Freibetrag, Freistellungsauftrag und die Steuer auf Erträge.'); setTimeout(()=>triggerReveal(4),800); }
  else{ showStatus('warning','Noch nicht ganz','Prüfe die rot markierten Stellen und versuche es erneut.'); setTimeout(()=>{ R5_MC.forEach((qq,qi)=>r5Opts[qi].forEach((o,k)=>{ const e=document.getElementById('r5mc-'+qi+'-'+k); e.classList.remove('correct','incorrect'); if(r5Choice[qi]===k) e.classList.add('selected'); })); },4500); }
};

/* ---------- Room 6 (N): freier Lückentext + Zahlenfeld ---------- */
const R6_FREE=[
  {id:1, correct:'Zinsen', accept:['zinsen','die zinsen','zins']},
  {id:2, correct:'schneller', accept:['schneller','immer schneller']},
  {id:3, correct:'Zeit', accept:['zeit','die zeit']},
  {id:4, correct:'Sparbetrag', accept:['sparbetrag','sparrate','monatsrate','monatsbetrag','betrag','rate']},
];
const R6_NUM={id:1, correct:'12', accept:['12']};
let r6Submitted=false;
function renderRoom6(){
  state.screen='room6'; renderSeals(); window.scrollTo({top:0,behavior:'instant'});
  r6Submitted=false;
  const room=ROOMS[5];
  const inp=(id,w)=>`<input class="cloze-input" id="r6f-${id}" type="text" maxlength="${w}" autocomplete="off">`;
  const part1=`<div class="card"><div class="part-label">Teil 1 · Lückentext (selbst eintippen)</div>
    <p class="cloze">Beim Zinseszinseffekt bekommt man im nächsten Jahr auch auf die bereits gutgeschriebenen ${inp(1,16)} wieder Zinsen. Dadurch wächst das Vermögen nicht gleichmäßig, sondern immer ${inp(2,16)}. Deshalb ist beim langfristigen Sparen vor allem die ${inp(3,12)} entscheidend – früh anzufangen bringt oft mehr als ein hoher Sparbetrag. Nach einer langen Ansparzeit ist der Effekt sogar so stark, dass man in einem einzigen Jahr mehr Zinsen erhält, als man in einem Monat überhaupt als ${inp(4,16)} zur Seite legt.</p></div>`;
  const part2=`<div class="card"><div class="part-label">Teil 2 · 72er-Regel anwenden (nur die Zahl eintragen)</div>
    <p class="cloze">Mit der 72er-Regel schätzt man die Verdopplungszeit: <strong>72 geteilt durch den Zinssatz</strong>.</p>
    <p class="cloze" style="margin-top:8px;">Bei <strong>6 %</strong> verdoppelt sich das Geld also nach ungefähr <input class="text-input" id="r6n-1" type="text" inputmode="numeric" maxlength="6" placeholder="Zahl" style="max-width:130px; display:inline-block;" autocomplete="off"> Jahren.</p></div>`;
  root.innerHTML=`${roomHeader(room)}${part1}${part2}${roomFooter('Teil 1: Worauf bekommt man beim Zinseszins zusätzlich Zinsen? Wie wächst das Vermögen mit der Zeit? Was ist beim langen Sparen am wichtigsten? Und welchen monatlichen Betrag übertreffen die Zinsen eines Jahres irgendwann? Teil 2: 72 geteilt durch 6.','checkR6()')}`;
}
window.checkR6=()=>{
  let allCorrect=true; const errors=[];
  R6_FREE.forEach(f=>{
    const ip=document.getElementById('r6f-'+f.id); ip.classList.remove('ok','bad');
    if(f.accept.includes(normalize(ip.value))) ip.classList.add('ok');
    else{ ip.classList.add('bad'); allCorrect=false; errors.push({kind:'falsche_eingabe', item:'Teil 1 · Lücke '+f.id, wrongAnswer:ip.value||'(leer)', correctAnswer:f.correct}); }
  });
  const ip=document.getElementById('r6n-1');
  if(R6_NUM.accept.includes(normalize(ip.value))) ip.style.borderColor='var(--success)';
  else{ ip.style.borderColor='var(--error)'; allCorrect=false; errors.push({kind:'falsche_eingabe', item:'Teil 2 · 72er-Regel (Verdopplungszeit bei 6 %)', wrongAnswer:ip.value||'(leer)', correctAnswer:R6_NUM.correct+' Jahre'}); }
  recordAttempt(5,{errors});
  if(allCorrect){ r6Submitted=true; showStatus('success','Richtig','Der letzte Notizzettel ist entschlüsselt. Konrads Lösungswort ist vollständig!'); setTimeout(()=>triggerReveal(5),800); }
  else{ showStatus('warning','Noch nicht ganz','Prüfe die rot markierten Stellen und versuche es erneut.'); }
};

/* ============================================================
   REVEAL & ROUTER
   ============================================================ */
function triggerReveal(roomIdx){
  state.solved[roomIdx]=true; state.letters[roomIdx]=CODE_WORD[roomIdx];
  const overlay=document.getElementById('revealOverlay');
  document.getElementById('revealLetter').textContent=CODE_WORD[roomIdx];
  document.getElementById('revealCaption').textContent=`Buchstabe ${roomIdx+1} von 6 freigeschaltet`;
  const progBox=document.getElementById('revealProgress'); progBox.innerHTML='';
  for(let i=0;i<6;i++){ const span=document.createElement('span'); span.className='reveal-progress-letter'+(state.solved[i]?' lit':''); span.textContent=state.solved[i]?CODE_WORD[i]:'·'; progBox.appendChild(span); }
  const btn=document.getElementById('revealContinue'); const isLast=roomIdx===5;
  btn.textContent=isLast?'Den Tresor öffnen':'Nächsten Notizzettel suchen';
  btn.onclick=()=>{ overlay.classList.remove('show'); setTimeout(()=>{ if(isLast) renderFinal(); else goLibrary(roomIdx+2); },250); };
  overlay.classList.add('show');
}
window.goRoom=(n)=>{
  window.scrollTo({top:0,behavior:'instant'});
  switch(n){ case 1:renderRoom1();break; case 2:renderRoom2();break; case 3:renderRoom3();break; case 4:renderRoom4();break; case 5:renderRoom5();break; case 6:renderRoom6();break; }
};

/* ============================================================
   FINAL
   ============================================================ */

function renderFinal(){
  state.screen='final';
  if(!state.completedAt) state.completedAt=new Date();
  renderSeals(); window.scrollTo({top:0,behavior:'instant'});
  const totalErrors=state.mistakes.reduce((a,m)=>a+(m&&m.errors?m.errors.length:0),0);
  const perfectRooms=state.attempts.filter((a,i)=>a>=1 && (!state.mistakes[i]||!state.mistakes[i].errors||state.mistakes[i].errors.length===0)).length;
  const summary = totalErrors===0
    ? `Alle sechs Abschnitte im ersten Versuch fehlerfrei – stark, ${escapeHtml(state.firstName)}.`
    : `Du hast ${perfectRooms} von 6 Abschnitten im ersten Versuch fehlerfrei gelöst (${totalErrors} Erstversuchs-Fehler). Im Überblick findest du alle mit Erklärung.`;

  root.innerHTML=`
    <div class="final-hero">
      <div class="kicker" style="justify-content:center;">Tresor geöffnet · Lösungswort</div>
      <div class="final-code">${CODE_WORD}</div>
      <p class="lede" style="margin:20px auto 0; max-width:60ch;">
        Geschafft, ${escapeHtml(state.firstName)}. Du hast alle sechs Notizzettel von Großonkel Konrad entschlüsselt und damit sein <strong>Vermögensgeheimnis</strong> gelüftet. Es war nie ein Trick – sondern ein einziges Wort, das er ein Leben lang beherzigt hat.
      </p>
      <p class="text-mute" style="margin-top:12px; max-width:60ch; margin-left:auto; margin-right:auto; font-size:13.5px;">${summary}</p>
    </div>

    <div class="emblem-wrap">
      ${euStarsSvg()}
      <div class="emblem-cap">Großonkel Konrads Tresor · endlich geöffnet</div>
    </div>

    <div class="card">
      <h2 style="font-size:22px; margin-bottom:6px;">Zwei Schritte zum Abschluss</h2>
      <p class="text-mute" style="font-size:13.5px; margin-bottom:20px;">Beide sind nötig, damit deine Lehrkraft den Abschluss verbuchen kann.</p>
      <div class="final-actions">
        <button class="final-action" onclick="downloadOverviewPDF()">
          <div class="label">Schritt 1 · Pflicht</div>
          <div class="title">„Überblick deiner Antworten &amp; Erläuterungen" herunterladen</div>
          <div class="desc">Persönliche PDF mit deinem Namen, Geburtsdatum, Bestätigungscode und Abschlusszeit, deinen Antworten im ersten Versuch sowie einer Seite mit Lösungserläuterungen. <strong style="color:var(--primary)">Lade sie in Moodle hoch.</strong></div>
        </button>
        <button class="final-action" onclick="openFeiditor()">
          <div class="label">Schritt 2 · Reflexion</div>
          <div class="title">Arbeitsblatt im Feiditor öffnen</div>
          <div class="desc">Der Feiditor öffnet sich in einem neuen Fenster mit deinen sechs Reflexionsaufgaben. Beantworte sie dort, wandle deinen Text in eine PDF um und <strong style="color:var(--primary)">lade auch diese PDF in Moodle hoch.</strong></div>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="steck-card">
        <h3>Warum lautet das Lösungswort SPAREN?</h3>
        <p style="font-size:14.5px;">Weil hinter Konrads Vermögen kein Geheimtrick steckte, sondern eine einfache Haltung: regelmäßig sparen und das Geld klug für sich arbeiten lassen. Jeder Buchstabe fasst einen Notizzettel zusammen:</p>
        <ul class="steck-list">
          <li><b>S</b> · <b>Sicher und renditestark abwägen</b> – das magische Dreieck: keine Anlage kann alles zugleich.</li>
          <li><b>P</b> · <b>Prüfen statt blind vertrauen</b> – die Einlagensicherung schützt 100.000 €, aber längst nicht alles.</li>
          <li><b>A</b> · <b>Anlegen mit dem richtigen Konto</b> – Tagesgeld bleibt flexibel, Festgeld ist fest und höher verzinst.</li>
          <li><b>R</b> · <b>Rendite und Risiko verstehen</b> – Zinsen als „Preis für Geld", Streuung über viele Werte mit Fonds.</li>
          <li><b>E</b> · <b>Erträge richtig versteuern</b> – Sparerpauschbetrag und Freistellungsauftrag nutzen.</li>
          <li><b>N</b> · <b>Nutze die Zeit</b> – der Zinseszinseffekt belohnt frühes, langes und regelmäßiges Sparen.</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:17px; margin-bottom:10px;">Konrads sechs Notizzettel</h3>
      <ul class="muted-list">
        <li><strong>Das magische Dreieck</strong> – Rendite, Sicherheit und Verfügbarkeit: keine Anlage erreicht alle drei zugleich</li>
        <li><strong>Vertraue keiner Bank blind</strong> – die Finanzkrise 2008, die Einlagensicherung und ihre Grenzen</li>
        <li><strong>Tagesgeld &amp; Festgeld</strong> – jederzeit verfügbar oder fest gebunden und höher verzinst</li>
        <li><strong>Zins &amp; Fonds</strong> – der „Preis für Geld" und die Streuung über viele Werte</li>
        <li><strong>Steuern auf Erträge</strong> – Abgeltungssteuer, Sparerpauschbetrag und Freistellungsauftrag</li>
        <li><strong>Der Zinseszinseffekt</strong> – Zinsen auf Zinsen, und warum die Zeit der größte Hebel ist</li>
      </ul>
    </div>
  `;
}

renderStart();
